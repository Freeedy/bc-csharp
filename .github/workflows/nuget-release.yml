name: Publish NuGet Package

on:
  workflow_dispatch:
    inputs:
      packageVersion:
        description: 'Package version (e.g. 1.0.1)'
        required: true
        type: string
      suffix:
        description: 'Version suffix (e.g. dvcs, rc1, beta). Leave empty for stable release.'
        required: false
        type: string
        default: 'dvcs'
      skipTests:
        description: 'Skip tests (for hotfixes only)'
        required: false
        type: boolean
        default: false

env:
  NUGET_SOURCE_URL: https://nuget.pkg.github.com/Freeedy/index.json
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}/output
  PROJECT_PATH: crypto/src/BouncyCastle.Crypto.csproj
  TEST_PROJECT_PATH: crypto/test/BouncyCastle.Crypto.Tests.csproj
  PACKAGE_NAME: BouncyCastle.Cryptography

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      final_version: ${{ steps.version.outputs.final_version }}
    steps:
      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.packageVersion }}"
          SUFFIX="${{ github.event.inputs.suffix }}"
          if [ -n "${SUFFIX}" ]; then
            VERSION="${VERSION}-${SUFFIX}"
          fi
          echo "final_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            crypto/src/bin/
            crypto/src/obj/
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.skipTests != 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: crypto/src/

      - name: Restore test project
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      - name: Build test project
        run: dotnet build ${{ env.TEST_PROJECT_PATH }} -c Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} -c Release --no-build --logger "console;verbosity=normal"

  deploy:
    runs-on: ubuntu-latest
    needs: [setup, build, test]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }} -p:NerdbankGitVersioningEnabled=false

      - name: Pack
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            -c Release \
            -p:NerdbankGitVersioningEnabled=false \
            -p:Version=${{ needs.setup.outputs.final_version }} \
            -p:PackageVersion=${{ needs.setup.outputs.final_version }} \
            -p:AssemblyVersion=${{ needs.setup.outputs.final_version }} \
            -p:SymbolPackageFormat=snupkg \
            -o ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Push NuGet package
        run: |
          dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg \
            -k ${{ secrets.NUGET_KEY }} \
            -s ${{ env.NUGET_SOURCE_URL }} \
            --skip-duplicate

      - name: Push symbol package
        run: |
          dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.snupkg \
            -k ${{ secrets.NUGET_KEY }} \
            -s ${{ env.NUGET_SOURCE_URL }} \
            --skip-duplicate
        continue-on-error: true

      - name: Create git tag
        run: |
          TAG="${{ env.PACKAGE_NAME }}-v${{ needs.setup.outputs.final_version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Tag ${TAG} created"
          fi
